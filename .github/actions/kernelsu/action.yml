name: Setup Wild KSU
description: Download and configure Wild KSU with version tracking
inputs:
  ksu_commit:
    description: "KSU Commit"
    required: true
    type: string

runs:
  using: composite
  steps:
    - name: Download Wild KSU
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/aosp
      run: |
        # Pin KSU-Next to the commit the combined KSUN+SUSFS patch was generated for.
        # The wild/archived combined patch (ksun-0daf55582-susfs-v2.1.0-e259e7d6.patch) targets
        # KSU-Next commit 0daf55582. Checking out dev-latest leaves the source half-patched on 5.10.
        # Allow override via ksu_commit input; default to the pinned compat commit.
        KSU_PIN="${{ inputs.ksu_commit }}"
        if [ -z "$KSU_PIN" ]; then
          KSU_PIN="0daf555826d83a0f68ba63d503b4a6e95ff80538"
        fi
        echo "Pinning KernelSU-Next to commit: $KSU_PIN"
        # setup.sh does a full clone (no --depth) and accepts a commit/tag as $1
        curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/dev/kernel/setup.sh" | bash -s "$KSU_PIN"

        cd KernelSU-Next/kernel

        COMMITS_COUNT=$(/usr/bin/git rev-list --count HEAD)
        BASE_VERSION=30000
        KSU_VERSION=$(expr $COMMITS_COUNT "+" $BASE_VERSION)
        sed -i "s/^KSU_VERSION_FALLBACK := 1$/KSU_VERSION_FALLBACK := ${KSU_VERSION}/" Kbuild

        KSU_GIT_TAG="$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.1")"
        sed -i "s/^KSU_VERSION_TAG_FALLBACK := v0.0.1$/KSU_VERSION_TAG_FALLBACK := ${KSU_GIT_TAG}/" Kbuild


    - name: Enable KernelSU Config
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        cat >> "${{ github.workspace }}/wild_gki.fragment" << 'EOF'
        # KernelSU Configuration
        CONFIG_KSU=y
        EOF
    
    - name: Extract KSU Version Info
      id: ksu-version
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/aosp/KernelSU-Next
      run: |
        # Extract and export KSU version info
        KSU_GIT_VERSION=$(git rev-list --count HEAD 2>/dev/null)
        KSU_GIT_TAG=$(git describe --tags --abbrev=0 2>/dev/null)
        KSU_COMMIT=$(git rev-parse --short HEAD 2>/dev/null)
        KSU_VERSION=$((30000 + KSU_GIT_VERSION))
        
        echo "KSU_GIT_TAG=$KSU_GIT_TAG" >> $GITHUB_ENV
        echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV
        echo "KSU_COMMIT=$KSU_COMMIT" >> $GITHUB_ENV
