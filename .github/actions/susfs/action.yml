name: Setup SUSFS
description: Clone and apply SUSFS patches with version-specific fixes
inputs:
  android_version:
    description: 'Android version (e.g., android15)'
    required: true
  kernel_version:
    description: 'Kernel version (e.g., 6.6)'
    required: true
  susfs_commit:
    description: 'Commit map (branch:commit,branch:commit...)'
    required: false

runs:
  using: composite
  steps:
    - name: Setup SUSFS Branch
      shell: bash
      run: |
        SUSFS_BRANCH="gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}"
        SUSFS_REPO="https://gitlab.com/simonpunk/susfs4ksu.git"
        
        echo "Preparing SUSFS for branch: $SUSFS_BRANCH"
        
        # Parse commit map to find the commit for this branch
        COMMIT_MAP="${{ inputs.susfs_commit }}"
        TARGET_COMMIT=""
        
        if [ -n "$COMMIT_MAP" ]; then
          # Split by comma
          IFS=',' read -ra ENTRIES <<< "$COMMIT_MAP"
          for entry in "${ENTRIES[@]}"; do
            # Split by colon
            IFS=':' read -r branch commit <<< "$entry"
            if [ "$branch" == "$SUSFS_BRANCH" ]; then
              TARGET_COMMIT="$commit"
              break
            fi
          done
        fi
        
        if [ -n "$TARGET_COMMIT" ]; then
          echo "Found specific commit for $SUSFS_BRANCH: $TARGET_COMMIT"
          git clone "$SUSFS_REPO" -b "$SUSFS_BRANCH" susfs4ksu
          cd susfs4ksu
          git checkout "$TARGET_COMMIT"
          cd ..
        else
          echo "No specific commit found for $SUSFS_BRANCH, cloning latest..."
          git clone "$SUSFS_REPO" -b "$SUSFS_BRANCH" --depth=1 susfs4ksu
        fi
        
        SUSFS_VERSION="v2.1.0"
        echo "SUSFS_VERSION=$SUSFS_VERSION" >> $GITHUB_ENV

    - name: Enable KernelSU SUSFS Config
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        cat >> "${{ github.workspace }}/wild_gki.fragment" << 'EOF'
        # KernelSU SUSFS Configuration
        CONFIG_KSU_SUSFS=y
        CONFIG_KSU_SUSFS_SUS_PATH=y
        CONFIG_KSU_SUSFS_SUS_MOUNT=y
        CONFIG_KSU_SUSFS_SUS_KSTAT=y
        CONFIG_KSU_SUSFS_SPOOF_UNAME=y
        CONFIG_KSU_SUSFS_ENABLE_LOG=y
        CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
        CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
        CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
        CONFIG_KSU_SUSFS_SUS_MAP=y
        EOF
    
    - name: Apply Kernel SUSFS Patches
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/aosp
      run: |
        # Apply base SUSFS patches
        cp "${{ github.workspace }}/susfs4ksu/kernel_patches/fs/"* "${{ github.workspace }}/kernel/aosp/fs/"
        cp "${{ github.workspace }}/susfs4ksu/kernel_patches/include/linux/"* "${{ github.workspace }}/kernel/aosp/include/linux/"
        cp ${{ github.workspace }}/susfs4ksu/kernel_patches/50_add_susfs_in_gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch ./
        patch -p1 < 50_add_susfs_in_gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch || true

    - name: Apply KSU SUSFS Patches
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/aosp/KernelSU-Next
      run: |
        set -e
        KP="${{ github.workspace }}/kernel_patches"
        AV="${ANDROID_VERSION:-}"
        KV="${KERNEL_VERSION:-}"
        KSU_SHORT="${KSU_COMMIT:-}"
        # Gather every combined KSUN+SUSFS patch across wild/ and wild/archived/.
        mapfile -t ALL < <(ls "$KP"/wild/ksun-*-susfs-*.patch "$KP"/wild/archived/ksun-*-susfs-*.patch 2>/dev/null || true)
        echo "Found ${#ALL[@]} combined KSUN+SUSFS patch candidate(s)"
        for f in "${ALL[@]}"; do echo "  candidate: $(basename "$f")"; done

        PATCH=""
        # 1) Prefer a patch whose filename embeds the current KSU commit (exact match).
        if [ -z "$PATCH" ] && [ -n "$KSU_SHORT" ]; then
          for f in "${ALL[@]}"; do
            basename "$f" | grep -q "$KSU_SHORT" && { PATCH="$f"; break; }
          done
        fi
        # 2) Prefer a patch tagged for THIS android version + kernel version (e.g. a13-5.10).
        if [ -z "$PATCH" ] && [ -n "$AV" ] && [ -n "$KV" ]; then
          TAG=$(echo "$AV" | sed 's/android/a/')  # android13 -> a13
          for f in "${ALL[@]}"; do
            basename "$f" | grep -qi "${TAG}-${KV}" && { PATCH="$f"; break; }
          done
        fi
        # 3) Fallback to the GENERIC patch (no aNN-K.K tag in filename) — intended for
        #    kernels WildKernels didn't ship a version-specific combined patch for.
        if [ -z "$PATCH" ]; then
          for f in "${ALL[@]}"; do
            basename "$f" | grep -qiE 'a[0-9]+-[0-9]+\.[0-9]+' && continue
            PATCH="$f"; break
          done
        fi

        if [ -z "$PATCH" ]; then
          echo "WARNING: no combined KSUN+SUSFS patch found — skipping (base SUSFS patch already applied)"
          exit 0
        fi
        echo "Using combined KSUN+SUSFS patch: $(basename "$PATCH")"
        cp "$PATCH" ./
        patch -p1 < "$(basename "$PATCH")" || { echo "WARNING: combined patch did not apply cleanly — continuing with base SUSFS only"; true; }
