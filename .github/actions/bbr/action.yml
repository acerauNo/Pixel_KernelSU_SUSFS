name: Setup TCP BBR v3
description: configure TCP BBR v3
inputs:
  kernel_version:
    description: 'Kernel version (e.g., 6.6)'
    required: true
  android_version:
    description: 'Android version (e.g., 12)'
    required: true

runs:
  using: composite
  steps:
    - name: Apply BBRv3 Patch
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/aosp
      run: |
        AV="${ANDROID_VERSION:-}"
        KV="${KERNEL_VERSION:-}"
        # Patches live in kernel_patches/bbr/ (subdir), named bbrv3-<android>-<kernel>.patch
        PATCH="$GITHUB_WORKSPACE/kernel_patches/bbr/bbrv3-${AV}-${KV}.patch"
        if [ ! -f "$PATCH" ]; then
          echo "WARNING: $PATCH not found — skipping BBRv3"
          echo "BBR_SKIP=1" >> $GITHUB_ENV
          exit 0
        fi
        cp "$PATCH" .
        if ! patch -p1 < "bbrv3-${AV}-${KV}.patch"; then
          echo "WARNING: BBRv3 patch did not apply cleanly — skipping BBRv3"
          echo "BBR_SKIP=1" >> $GITHUB_ENV
          exit 0
        fi

    - name: Fix modules.bzl
      shell: bash
      if: false
      working-directory: ${{ github.workspace }}/kernel/aosp
      run: |
        if [ "$KERNEL_VERSION" == "6.1" ]; then
          mods_file=modules.bzl
          for m in "net/ipv4/tcp_bic.ko" "net/ipv4/tcp_htcp.ko" "net/ipv4/tcp_westwood.ko"; do
            grep -q "'$m'" "$mods_file" && continue
            sed -i "/_ARM64_GKI_MODULES_LIST = \[/,/^]/ s/^]/    \"$m\",\n]/" "$mods_file"
          done
        fi

    - name: Add BBRv3 Config
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        cat >> "${{ github.workspace }}/wild_gki.fragment" << 'EOF'
        CONFIG_TCP_CONG_ADVANCED=y
        CONFIG_TCP_CONG_BBR=y
        CONFIG_DEFAULT_BBR=y
        CONFIG_DEFAULT_TCP_CONG="bbr"
        CONFIG_NET_SCH_FQ=y
        # CONFIG_TCP_CONG_BIC is not set
        # CONFIG_TCP_CONG_WESTWOOD is not set
        # CONFIG_TCP_CONG_HTCP is not set
        EOF
        

    
